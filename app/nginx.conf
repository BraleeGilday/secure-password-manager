server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html =404;
    }

    location /api/ {
        proxy_pass http://localhost:8000;d
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}